<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Element Pada HTML</title>
</head>

<body>
  <form action="">
    <label for="nama">Nama:
      <input type="text" name="nama" id="nama" placeholder="Masukkan Text">
    </label>
    <br>
    <label for="password">Password:
      <input type="password" name="password" id="password">
    </label>
    <br>
    <label for="email"> Email:
      <input type="email" name="email" id="email">
    </label>
    <br>
    <label for="number"> Nilai:
      <input type="number" name="number" id="number" min="0" max="100" step="5">
    </label>
    <br>
    <label for="date">Tanggal:
      <input type="date" name="date" id="date">
    </label>
    <br>
    <label for="color"> Warna:
      <input type="color" name="color" id="color">
    </label>
    <br>
    <button type="submit">Kirim!</button>
  </form>
</body>

</html>
