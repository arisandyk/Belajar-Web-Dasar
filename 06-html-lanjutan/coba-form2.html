<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Atribut, Checkbox & Radio</title>
</head>

<body>
  <h1>Contoh Input Atribut, CheckBox, & Radio</h1>
  <form action="">
    <label for="nama"> Nama:
      <input type="text" name="nama" id="nama" autocomplete="off" autofocus required>
    </label>
    <br>
    <h3>Hobby:</h3>
    <label for="hobby1">
      <input type="checkbox" name="hobby1" id="hobby1" value="olahraga"> Olahraga
    </label>
    <br>
    <label for="hobby2">
      <input type="checkbox" name="hobby2" id="hobby2" value="panahan"> Panahan
    </label>
    <br>

    <h3>Jenis Kelamin:</h3>
    <label for="pria">
      <input type="radio" name="jenis_kelamin" id="pria" value="pria" checked>
      Pria
    </label>
    <br>
    <label for="wanita">
      <input type="radio" name="jenis_kelamin" id="wanita" value="wanita">
      Wanita
    </label>
    <br>
    <button type="submit">Kirim!</button>
  </form>
</body>

</html>
