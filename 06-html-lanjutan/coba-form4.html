<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Element Pada HTML Dalam Tabel</title>
</head>

<body>





  <form action="">
    <table cellpadding="4">
      <tr>
        <td align="right"><label for="nama">Nama:</label></td>
        <td><input type="text" name="nama" id="nama" placeholder="Masukkan Text"></td>
      </tr>
      <tr>
        <td align="right"><label for="password">Password: </label></td>
        <td><input type="password" name="password" id="password"></td>
      </tr>
      <tr>
        <td align="right"><label for="email"> Email:</label></td>
        <td><input type="email" name="email" id="email"></td>
      </tr>
      <tr>
        <td align="right"><label for="number"> Nilai:</label></td>
        <td><input type="number" name="number" id="number" min="0" max="100" step="5"></td>
      </tr>
      <tr>
        <td align="right"><label for="date">Tanggal:</label></td>
        <td><input type="date" name="date" id="date"></td>
      </tr>
      <tr>
        <td align="right"><label for="color"> Warna:</label></td>
        <td> <input type="color" name="color" id="color"></td>
      </tr>
      <tr>
        <td colspan="2"><button type="submit">Kirim!</button></td>
      </tr>
    </table>
  </form>
</body>

</html>
