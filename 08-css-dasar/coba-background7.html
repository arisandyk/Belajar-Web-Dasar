<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiple Background</title>
  <style>
    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #333;
    }

    .frame {
      width: 400px;
      height: 400px;
      border: 10px solid white;
      margin: auto;
      background-image: url(img/HanniNewest.png), url(img/pinkblob.png), url(img/pinkbg.png);
      background-size: 380px, 350px, 400px;
      background-repeat: no-repeat, no-repeat, no-repeat;
      background-position: center bottom, center 70%, bottom left;
      background-color: #f0f0f0;
      border-radius: 50%;
    }

    h1 {
      color: white;
      text-align: center;
      font-family: 'Courier New', Courier, monospace;
      font-size: 40px;
      text-shadow: 2px 2px 4px black;
    }
  </style>
</head>

<body>
  <h1>My Bias Profile Card</h1>
  <div class="frame"></div>

</body>

</html>
